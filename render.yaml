services:
  - type: web
    name: worldcup2026-predictor-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: CORS_ORIGINS
        value: "https://frontend-lake-pi-60.vercel.app,http://localhost:3000"
      - key: API_FOOTBALL_KEY
        sync: false
      - key: FOOTBALLDATA_KEY
        sync: false
    autoDeploy: true
