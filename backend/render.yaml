services:
  - type: web
    name: worldcup2026-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: https://frontend-lake-pi-60.vercel.app,http://localhost:3000
      - key: PYTHON_VERSION
        value: 3.11.9
